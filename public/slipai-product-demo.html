<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:title" content="라이트 코튼 데일리 티셔츠" />
    <meta property="og:image" content="/demo-product.svg" />
    <meta property="product:price:amount" content="59000" />
    <title>라이트 코튼 데일리 티셔츠</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "라이트 코튼 데일리 티셔츠",
        "sku": "1001",
        "image": "/demo-product.svg",
        "description": "가볍고 부드러운 데일리 티셔츠입니다.",
        "offers": {
          "@type": "Offer",
          "price": "59000",
          "priceCurrency": "KRW"
        },
        "review": [
          {
            "@type": "Review",
            "reviewBody": "실제 색감이 차분하고 소재가 부드러워서 데일리로 입기 좋았어요.",
            "reviewRating": { "@type": "Rating", "ratingValue": "5" }
          },
          {
            "@type": "Review",
            "reviewBody": "핏이 과하지 않고 세탁 후에도 형태가 잘 유지됐어요.",
            "reviewRating": { "@type": "Rating", "ratingValue": "5" }
          }
        ]
      }
    </script>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #151515;
        background: #f3f5f7;
      }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 20px 140px;
      }
      .product {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 26px;
        align-items: center;
        padding: 28px;
        border: 1px solid #dde2e8;
        border-radius: 14px;
        background: #fff;
      }
      .product-image {
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid #e4e7eb;
        border-radius: 14px;
        background: #f7f7f8;
        object-fit: cover;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 34px;
      }
      .price {
        font-size: 22px;
        font-weight: 800;
      }
      .copy {
        margin-top: 18px;
        line-height: 1.7;
      }
      .btnBuy,
      .btnBasket {
        margin: 18px 8px 0 0;
        padding: 13px 18px;
        border: 0;
        border-radius: 8px;
        font-weight: 800;
        cursor: pointer;
      }
      .btnBuy {
        color: #fff;
        background: #111;
      }
      .btnBasket {
        background: #e9edf2;
      }
      .spacer {
        height: 900px;
      }
      @media (max-width: 720px) {
        .product {
          grid-template-columns: 1fr;
        }
        .product-image {
          max-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="product xans-product-detail" data-product-no="1001">
        <img class="product-image" src="/demo-product.svg" alt="라이트 코튼 데일리 티셔츠" />
        <div>
          <p>슬립AI 데모몰</p>
          <h1>라이트 코튼 데일리 티셔츠</h1>
          <div id="span_product_price_text" class="price">59,000원</div>
          <p class="copy">
            상품 상세페이지에 설치한 스크립트가 5초 체류 후 리뷰 하이라이트와 유사 상품을 보여주는지 확인하는
            데모입니다.
          </p>
          <button class="btnBuy" type="button">구매하기</button>
          <button class="btnBasket" type="button">장바구니 담기</button>
        </div>
      </section>
      <div class="spacer"></div>
    </main>

    <script
      async
      src="/widget/v1.js?v=0.3.1-product-demo"
      data-project-key="pk_demo"
      data-mall-id="demo"
      data-widget-token="demo_widget_token"
      data-dwell-seconds="5"
      data-debug="true"
    ></script>
  </body>
</html>
