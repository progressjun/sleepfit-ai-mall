<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SleepFit AI 데모 | 베개 카테고리</title>
    <style>
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Noto Sans KR",
          sans-serif;
        color: #201610;
        background: #f7f3ef;
      }

      main {
        max-width: 1060px;
        margin: 0 auto;
        padding: 44px 20px 180px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
      }

      .lead {
        margin: 0 0 28px;
        color: #66574c;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 0 0 28px;
      }

      .demo-open {
        border: 0;
        border-radius: 8px;
        padding: 13px 18px;
        color: #fff;
        background: #201610;
        font-weight: 900;
        cursor: pointer;
      }

      .demo-open:hover {
        transform: translateY(-1px);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .card {
        border: 1px solid #e4d9cf;
        border-radius: 10px;
        background: #fff;
        overflow: hidden;
        color: inherit;
        text-decoration: none;
      }

      .card img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        display: block;
      }

      .card div {
        padding: 14px;
      }

      .card strong {
        display: block;
        font-size: 15px;
        line-height: 1.4;
      }

      .card span {
        display: block;
        margin-top: 8px;
        color: #5b3a27;
        font-weight: 900;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }

        h1 {
          font-size: 27px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>베개</h1>
      <p class="lead">카테고리에서는 하단 플로팅 버튼으로 수면핏 진단을 시작합니다.</p>
      <div class="hero-actions">
        <button id="sleepfit-demo-open" class="demo-open" type="button">수면핏 진단 시작하기</button>
      </div>
      <section class="grid">
        <a class="card" href="https://sleepnsleepmall.com/product/detail.html?product_no=330">
          <img
            src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202503/c37b0ec9db0b472dd1915a4c7973d0e4.jpg"
            alt="[슬립앤슬립] 깊은잠베개"
          />
          <div><strong>[슬립앤슬립] 깊은잠베개</strong><span>94,900원</span></div>
        </a>
        <a class="card" href="https://sleepnsleepmall.com/product/detail.html?product_no=345">
          <img
            src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202410/4c2883d241621aed34f65b29e2962bc9.jpg"
            alt="[슬립앤슬립] 와이드핏 베개"
          />
          <div><strong>[슬립앤슬립] 와이드핏 베개</strong><span>157,500원</span></div>
        </a>
        <a class="card" href="https://sleepnsleepmall.com/product/detail.html?product_no=36">
          <img
            src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202402/675a7c807e6e683d7aac7024d1ffdca5.jpg"
            alt="[슬립앤슬립] 리얼 오가닉 베개"
          />
          <div><strong>[슬립앤슬립] 리얼 오가닉 베개</strong><span>79,000원</span></div>
        </a>
      </section>
    </main>

    <script async src="/sleepfit.js" data-mall-id="sleepnsleepmall" data-debug="true"></script>
    <script>
      document.getElementById("sleepfit-demo-open").addEventListener("click", function () {
        var tries = 0;
        function openWidget() {
          tries += 1;
          if (window.sleepfitAI && typeof window.sleepfitAI.open === "function") {
            window.sleepfitAI.open();
            return;
          }
          var host = document.querySelector("[data-sleepfit-host]");
          var launcher = host && host.shadowRoot ? host.shadowRoot.querySelector(".launcher") : null;
          if (launcher) {
            launcher.click();
            return;
          }
          if (tries < 20) window.setTimeout(openWidget, 150);
        }
        openWidget();
      });
    </script>
  </body>
</html>
