<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SleepFit AI 데모 | Cafe24 카테고리 경로</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #241b16;
        background: #fff;
        font-family:
          "Noto Sans KR",
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      header {
        border-bottom: 1px solid #e7dfd8;
        background: #fff;
      }

      .nav,
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 18px;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-size: 20px;
        font-weight: 900;
      }

      .menu {
        display: flex;
        gap: 24px;
        color: #43362e;
        font-size: 14px;
        font-weight: 800;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 34px;
      }

      .lead {
        color: #6f625a;
        line-height: 1.6;
      }

      .xans-product-listnormal {
        margin-top: 24px;
      }

      .prdList {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }

      .item {
        color: inherit;
        text-decoration: none;
      }

      .item img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border: 1px solid #e7dfd8;
        border-radius: 8px;
        background: #f7f3ef;
      }

      .item strong {
        display: block;
        margin-top: 12px;
        min-height: 42px;
        font-size: 15px;
        line-height: 1.4;
      }

      .price {
        margin-top: 6px;
        color: #5b3a27;
        font-size: 15px;
        font-weight: 900;
      }

      @media (max-width: 760px) {
        .menu {
          display: none;
        }

        .prdList {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="nav">
        <div class="logo">SLEEP&amp;SLEEP</div>
        <nav class="menu" aria-label="주요 메뉴">
          <span>BEST</span>
          <span>베개</span>
          <span>토퍼/매트리스</span>
          <span>침구</span>
        </nav>
      </div>
    </header>

    <main>
      <h1>베개</h1>
      <p class="lead">실제 카페24 카테고리와 같은 <code>/product/list.html?cate_no=45</code> 경로 감지 테스트입니다.</p>

      <section class="xans-product-listnormal">
        <div class="prdList">
          <a class="item" data-product-no="330" href="https://sleepnsleepmall.com/product/detail.html?product_no=330">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202503/c37b0ec9db0b472dd1915a4c7973d0e4.jpg"
              alt="슬립앤슬립 깊은잠베개"
            />
            <strong>슬립앤슬립 깊은잠베개</strong>
            <div class="price">94,900원</div>
          </a>
          <a class="item" data-product-no="345" href="https://sleepnsleepmall.com/product/detail.html?product_no=345">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202410/4c2883d241621aed34f65b29e2962bc9.jpg"
              alt="슬립앤슬립 와이드핏 베개"
            />
            <strong>슬립앤슬립 와이드핏 베개</strong>
            <div class="price">157,500원</div>
          </a>
          <a class="item" data-product-no="36" href="https://sleepnsleepmall.com/product/detail.html?product_no=36">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202402/675a7c807e6e683d7aac7024d1ffdca5.jpg"
              alt="슬립앤슬립 리얼 오가닉 베개"
            />
            <strong>슬립앤슬립 리얼 오가닉 베개</strong>
            <div class="price">79,000원</div>
          </a>
          <a class="item" data-product-no="392" href="https://sleepnsleepmall.com/product/detail.html?product_no=392">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202509/da9ae273f6de84fe28bef2c1b6475551.jpg"
              alt="아이스넷 냉감 베개커버"
            />
            <strong>아이스넷 냉감 베개커버</strong>
            <div class="price">25,000원</div>
          </a>
        </div>
      </section>
    </main>

    <script async src="/sleepfit.js" data-mall-id="sleepnsleepmall" data-debug="true"></script>
  </body>
</html>
