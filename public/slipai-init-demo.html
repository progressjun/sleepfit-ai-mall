<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:title" content="SlipAI 초기화 스니펫 데모" />
    <meta property="og:image" content="/demo-product.svg" />
    <meta property="product:price:amount" content="49000" />
    <title>SlipAI 초기화 스니펫 데모</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #151515;
        background: #f5f6f8;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 20px 140px;
      }
      .product {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 24px;
        align-items: center;
        padding: 28px;
        border: 1px solid #dde2e8;
        border-radius: 16px;
        background: #fff;
      }
      .product-image {
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid #e4e7eb;
        border-radius: 18px;
        background: #f7f7f8;
        object-fit: cover;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      .price {
        font-size: 22px;
        font-weight: 800;
      }
      .copy {
        margin-top: 18px;
        line-height: 1.7;
      }
      .btnBuy,
      .btnBasket {
        margin: 18px 8px 0 0;
        padding: 13px 18px;
        border: 0;
        border-radius: 10px;
        font-weight: 800;
        cursor: pointer;
      }
      .btnBuy {
        color: #fff;
        background: #111;
      }
      .btnBasket {
        background: #e9edf2;
      }
      .spacer {
        height: 900px;
      }
      @media (max-width: 720px) {
        .product {
          grid-template-columns: 1fr;
        }
        .product-image {
          max-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="product xans-product-detail" data-product-no="2001">
        <img class="product-image" src="/demo-product.svg" alt="데모 상품 이미지" />
        <div>
          <p>슬립AI 테스트몰</p>
          <h1>초경량 데일리 이너 티셔츠</h1>
          <div id="span_product_price_text" class="price">49,000원</div>
          <p class="copy">
            이 페이지는 Google/Meta 스타일 초기화 스니펫을 검증하는 데모입니다. window.slipai("init", ...)
            설정만으로도 상담사와 추천 배너가 한글로 표시되어야 합니다.
          </p>
          <button class="btnBuy" type="button">구매하기</button>
          <button class="btnBasket" type="button">장바구니 담기</button>
        </div>
      </section>
      <div class="spacer"></div>
    </main>

    <script>
      window.slipai =
        window.slipai ||
        function () {
          (window.slipai.q = window.slipai.q || []).push(arguments);
        };
      window.slipai("init", {
        projectKey: "pk_demo",
        mallId: "demo",
        token: "demo_widget_token",
        dwellSeconds: 5,
        debug: true
      });
    </script>
    <script async src="/widget/v1.js?v=init-demo"></script>
  </body>
</html>
