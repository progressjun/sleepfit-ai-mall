<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SleepFit AI 데모 | 실제몰 홈 노출</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #1d1713;
        background: #fff;
        font-family:
          "Noto Sans KR",
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .topline {
        display: flex;
        justify-content: center;
        gap: 24px;
        padding: 10px 16px;
        color: #fff;
        background: #19120f;
        font-size: 13px;
        font-weight: 700;
      }

      header {
        border-bottom: 1px solid #e6ded6;
        background: #fff;
      }

      .nav {
        display: grid;
        grid-template-columns: 180px minmax(0, 1fr) 160px;
        align-items: center;
        gap: 18px;
        max-width: 1180px;
        margin: 0 auto;
        padding: 18px;
      }

      .logo {
        font-size: 20px;
        font-weight: 900;
      }

      .menu {
        display: flex;
        justify-content: center;
        gap: 34px;
        color: #2a211d;
        font-size: 14px;
        font-weight: 800;
      }

      .icons {
        display: flex;
        justify-content: flex-end;
        gap: 14px;
        color: #6f625a;
        font-size: 13px;
      }

      .hero {
        min-height: 500px;
        display: grid;
        align-items: center;
        background: #f7f3ef;
      }

      .hero-inner {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(420px, 1.05fr);
        align-items: center;
        gap: 34px;
        max-width: 1180px;
        width: 100%;
        margin: 0 auto;
        padding: 48px 18px 56px;
      }

      .hero-copy p {
        margin: 0 0 14px;
        color: #76543d;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(38px, 5vw, 70px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .desc {
        max-width: 460px;
        margin-top: 18px;
        color: #6f625a;
        font-size: 17px;
        line-height: 1.7;
      }

      .hero-media img {
        display: block;
        width: 100%;
        max-height: 420px;
        object-fit: contain;
      }

      .section {
        max-width: 1180px;
        margin: 0 auto;
        padding: 60px 18px 120px;
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .section h2 {
        margin: 0;
        font-size: 28px;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }

      .product {
        min-width: 0;
        color: inherit;
        text-decoration: none;
      }

      .product img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border: 1px solid #e6ded6;
        border-radius: 8px;
        background: #f7f3ef;
      }

      .product strong {
        display: block;
        margin-top: 12px;
        min-height: 42px;
        font-size: 15px;
        line-height: 1.4;
      }

      .price {
        margin-top: 6px;
        color: #5b3a27;
        font-size: 15px;
        font-weight: 900;
      }

      @media (max-width: 840px) {
        .topline {
          display: none;
        }

        .nav {
          grid-template-columns: 1fr auto;
        }

        .menu {
          grid-column: 1 / -1;
          justify-content: flex-start;
          gap: 18px;
          overflow-x: auto;
          white-space: nowrap;
        }

        .hero-inner {
          grid-template-columns: 1fr;
          padding-top: 34px;
        }

        .products {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="topline">
      <span>깊은잠베개 대표 라인</span>
      <span>여름 냉감 침구 기획전</span>
    </div>
    <header>
      <div class="nav">
        <div class="logo">SLEEP&amp;SLEEP</div>
        <nav class="menu" aria-label="주요 메뉴">
          <span>BEST</span>
          <span>베개</span>
          <span>토퍼/매트리스</span>
          <span>침구</span>
          <span>이벤트</span>
        </nav>
        <div class="icons">
          <span>검색</span>
          <span>장바구니 0</span>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <div class="hero-copy">
            <p>리뷰 기반 대표 베개</p>
            <h1>깊은잠베개</h1>
            <div class="desc">
              홈에서는 플로팅 버튼으로 진단을 시작합니다. 방문자가 상품을 고르기 전 수면 습관 기준으로 빠르게 진입하도록
              돕는 노출 예시입니다.
            </div>
          </div>
          <div class="hero-media" aria-hidden="true">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202503/c37b0ec9db0b472dd1915a4c7973d0e4.jpg"
              alt=""
            />
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>BEST SELLER</h2>
          <span>고객이 많이 찾는 상품</span>
        </div>
        <div class="products">
          <a class="product" href="https://sleepnsleepmall.com/product/detail.html?product_no=330">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202503/c37b0ec9db0b472dd1915a4c7973d0e4.jpg"
              alt="슬립앤슬립 깊은잠베개"
            />
            <strong>슬립앤슬립 깊은잠베개</strong>
            <div class="price">94,900원</div>
          </a>
          <a class="product" href="https://sleepnsleepmall.com/product/detail.html?product_no=345">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202410/4c2883d241621aed34f65b29e2962bc9.jpg"
              alt="슬립앤슬립 와이드핏 베개"
            />
            <strong>슬립앤슬립 와이드핏 베개</strong>
            <div class="price">157,500원</div>
          </a>
          <a class="product" href="https://sleepnsleepmall.com/product/detail.html?product_no=394">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202509/85a09ed2f98e9830333a91aebfc2b8c8.jpg"
              alt="아이스넷 냉감패드"
            />
            <strong>아이스넷 냉감패드</strong>
            <div class="price">105,000원</div>
          </a>
          <a class="product" href="https://sleepnsleepmall.com/product/detail.html?product_no=36">
            <img
              src="https://cafe24img.poxo.com/sleepnsleepmall/web/product/medium/202402/675a7c807e6e683d7aac7024d1ffdca5.jpg"
              alt="슬립앤슬립 리얼 오가닉 베개"
            />
            <strong>슬립앤슬립 리얼 오가닉 베개</strong>
            <div class="price">79,000원</div>
          </a>
        </div>
      </section>
    </main>

    <script async src="/sleepfit.js" data-mall-id="sleepnsleepmall" data-surface="home" data-debug="true"></script>
  </body>
</html>
